apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: massmach/my-app:70984ce51e95fb52c29137ed0e9895bab12d0eaa
        ports:
        - containerPort: 5000
