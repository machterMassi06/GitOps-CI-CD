name: GitOps workflow with ArgoCD
on: 
    push:
        branches:
            - main 
        paths-ignore:
            - 'manifests-k8s/**' # ignore changes to manifest to prevent loop
env : 
  GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
  PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
jobs: 
    build: 
        runs-on: ubuntu-latest 
        steps:
            - name: Checkout the code
              uses: actions/checkout@v3
              with: 
                token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
                fetch-depth: 0

            - name: Build Docker Image
              run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }} . 

            - name: Scan Docker Image with Trivy
              run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }}
            
            - name: Log in to DockerHub
              run: echo "${{ secrets.DOCKERHUB_TOKEN}}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin 
            
            - name: Push Docker image to DockerHub
              run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }}
    
    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code 
              uses: actions/checkout@v3
              with: 
                token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
                fetch-depth: 0
            - name: Install ArgoCD CLI 
              run: |
                  curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
                  chmod +x argocd 
                  sudo mv argocd /usr/local/bin/argocd
            - name: Login to ArgoCD
              run: | 
                  argocd login ${{ secrets.ARGOCD_SERVER }} \
                  --username ${{ secrets.ARGOCD_USERNAME }} \
                  --password ${{ secrets.ARGOCD_PASSWORD }} \
                  --insecure 
            - name: Update deployment.yaml with newly built app image 
              run: |
                  git config user.name "${{ secrets.GIT_USERNAME }}"
                  git config user.email "${{ secrets.GIT_EMAIL }}"
                  git fetch origin 
                  git checkout main 
                  git pull origin main 
                  pwd 
                  cat manifests-k8s/deployment.yml
                  pwd 
                  sed -i "s+${{ secrets.DOCKERHUB_USERNAME }}/my-app.*+${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }}+g" manifests-k8s/deployment.yml
                  cat manifests-k8s/deployment.yml

            - name: Commit and Push Updated manifests-k8s/deployment.yml
              run: |
                  git config user.name "${{ secrets.GIT_USERNAME }}"
                  git config user.email "${{ secrets.GIT_EMAIL }}"
                  git remote set-url origin https://$GIT_USERNAME:$PERSONAL_ACCESS_TOKEN@github.com/${{ github.repository }}.git
                  git fetch origin
                  git checkout main
                  git pull origin main
                  git add .
                  git commit -m "Update image to my-app:${{ github.sha }}"
                  git push origin main            
            - name: Refresh ArgoCD App and Sync
              run: argocd app sync argocd-github-action